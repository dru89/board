# ----------------------------------------------------------------- display
display:
  - platform: waveshare_epaper
    id: epaper
    cs_pin: GPIO19
    dc_pin: GPIO17
    busy_pin:
      number: GPIO4
      inverted: true
    reset_pin: GPIO16
    model: 7.50inv2p
    update_interval: never
    full_update_every: 30
    lambda: |-
      // ------------------------------------------------ constants & helpers
      const int W = 800, H = 480, LEFT_W = 296, STATUS_H = 56, MARGIN = 20;
      const int COL_C = LEFT_W / 2;
      static const char *WDAY3[] = {"SUN","MON","TUE","WED","THU","FRI","SAT"};
      static const char *WDAY_FULL[] = {"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"};
      static const char *MON3[] = {"JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"};
      static const char *MON_FULL[] = {"January","February","March","April","May","June","July","August","September","October","November","December"};

      auto text_w = [&](const char *s, esphome::display::BaseFont *f) -> int {
        int x1, y1, w, h;
        it.get_text_bounds(0, 0, s, f, TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
        return w;
      };
      auto hline = [&](int x, int y, int w2, int t) { it.filled_rectangle(x, y, w2, t); };
      auto pill = [&](int x0, int y0, int x1, int y1) {
        int r = (y1 - y0) / 2, cy = (y0 + y1) / 2;
        it.filled_circle(x0 + r, cy, r);
        it.filled_circle(x1 - r, cy, r);
        it.filled_rectangle(x0 + r, y0, x1 - x0 - 2 * r, y1 - y0);
      };
      // days since 1970-01-01 for a civil date (Hinnant's algorithm)
      auto days_from_civil = [](int y, int m, int d) -> long {
        y -= m <= 2;
        long era = (y >= 0 ? y : y - 399) / 400;
        unsigned yoe = (unsigned)(y - era * 400);
        unsigned doy = (153u * (unsigned)(m + (m > 2 ? -3 : 9)) + 2u) / 5u + (unsigned)d - 1u;
        unsigned doe = yoe * 365u + yoe / 4u - yoe / 100u + doy;
        return era * 146097L + (long)doe - 719468L;
      };

      auto now = id(ha_time).now();
      if (!now.is_valid()) {
        it.print(W / 2, H / 2, id(font_date), TextAlign::CENTER, "Connecting…");
        return;
      }

      // --------------------------------------------------------- structure
      it.filled_rectangle(LEFT_W, 16, 2, H - STATUS_H - 28);   // vertical rule
      it.filled_rectangle(0, H - STATUS_H, W, 2);              // status rule

      // ------------------------------------------------------------- clock
      int hr = now.hour % 12; if (hr == 0) hr = 12;
      char clock_s[8], date_s[40];
      snprintf(clock_s, sizeof(clock_s), "%d:%02d", hr, now.minute);
      const char *ampm = now.hour < 12 ? "AM" : "PM";
      int tw = text_w(clock_s, id(font_clock));
      int aw = text_w(ampm, id(font_ampm)) + 6;
      int cx0 = COL_C - (tw + aw) / 2;
      it.print(cx0, 18, id(font_clock), clock_s);
      it.print(cx0 + tw + 6, 96, id(font_ampm), ampm);
      snprintf(date_s, sizeof(date_s), "%s, %s %d",
               WDAY_FULL[(now.day_of_week - 1) % 7], MON_FULL[now.month - 1],
               now.day_of_month);
      it.print(COL_C, 148, id(font_date), TextAlign::TOP_CENTER, date_s);

      hline(MARGIN, 192, LEFT_W - 2 * MARGIN, 2);

      // ----------------------------------------------------------- weather
      std::string cond = id(wx_cond).has_state() ? id(wx_cond).state : "";
      // no state yet (e.g. right after boot): draw nothing rather than the
      // alert icon — a blank can't leave ghosting behind
      const char *wx_icon = cond.empty() ? nullptr : "\U000F05D6";
      const char *wx_label = "--";
      if (cond == "sunny") { wx_icon = "\U000F0599"; wx_label = "Sunny"; }
      else if (cond == "clear-night") { wx_icon = "\U000F0594"; wx_label = "Clear"; }
      else if (cond == "partlycloudy") { wx_icon = now.hour >= 6 && now.hour < 20 ? "\U000F0595" : "\U000F0F31"; wx_label = "Partly cloudy"; }
      else if (cond == "cloudy") { wx_icon = "\U000F0590"; wx_label = "Cloudy"; }
      else if (cond == "rainy") { wx_icon = "\U000F0597"; wx_label = "Rain"; }
      else if (cond == "pouring") { wx_icon = "\U000F0596"; wx_label = "Heavy rain"; }
      else if (cond == "lightning") { wx_icon = "\U000F0593"; wx_label = "Storms"; }
      else if (cond == "lightning-rainy") { wx_icon = "\U000F067E"; wx_label = "Storms"; }
      else if (cond == "snowy") { wx_icon = "\U000F0598"; wx_label = "Snow"; }
      else if (cond == "snowy-rainy") { wx_icon = "\U000F067F"; wx_label = "Wintry mix"; }
      else if (cond == "fog") { wx_icon = "\U000F0591"; wx_label = "Fog"; }
      else if (cond == "hail") { wx_icon = "\U000F0592"; wx_label = "Hail"; }
      else if (cond == "windy" || cond == "windy-variant") { wx_icon = "\U000F059D"; wx_label = "Windy"; }

      if (wx_icon != nullptr) it.print(24, 204, id(mdi_lg), wx_icon);
      if (id(wx_temp).has_state())
        it.printf(124, 200, id(font_temp), "%.0f°", id(wx_temp).state);
      if (id(wx_feels).has_state())
        it.printf(126, 264, id(font_small), "%s · feels %.0f°", wx_label, id(wx_feels).state);
      else
        it.print(126, 264, id(font_small), wx_label);
      if (id(wx_high).has_state() && id(wx_low).has_state())
        it.printf(COL_C, 304, id(font_hl), TextAlign::TOP_CENTER, "H %.0f°   L %.0f°",
                  id(wx_high).state, id(wx_low).state);
      {
        char line2[48] = "";
        if (id(wx_rain).has_state() && id(wx_wind).has_state())
          snprintf(line2, sizeof(line2), "Rain %.0f%%  ·  Wind %.0f mph", id(wx_rain).state, id(wx_wind).state);
        else if (id(wx_wind).has_state())
          snprintf(line2, sizeof(line2), "Wind %.0f mph", id(wx_wind).state);
        if (line2[0]) it.print(COL_C, 336, id(font_small), TextAlign::TOP_CENTER, line2);
      }

      // --------------------------------------------------- trash/recycling
      {
        int wd = now.day_of_week;  // 1 = Sunday ... 7 = Saturday
        bool show = (wd == 2 && now.hour >= 12) || (wd == 3 && now.hour < 12);
        if (show) {
          long pickup = days_from_civil(now.year, now.month, now.day_of_month) + (wd == 2 ? 1 : 0);
          long anchor = days_from_civil(2026, 7, 14);  // known recycling pickup
          bool recycling = (((pickup - anchor) / 7) % 2) == 0;
          pill(MARGIN, 370, LEFT_W - MARGIN, 412);
          const char *label = recycling ? "TRASH + RECYCLING" : "TRASH NIGHT";
          int lw = text_w(label, id(font_hdr));
          int total = (recycling ? 2 : 1) * 34 + lw;
          int x = COL_C - total / 2;
          it.print(x, 378, id(mdi_md), COLOR_OFF, "\U000F0A7A");
          x += 34;
          if (recycling) { it.print(x, 378, id(mdi_md), COLOR_OFF, "\U000F044C"); x += 34; }
          it.print(x, 391, id(font_hdr), COLOR_OFF, TextAlign::CENTER_LEFT, label);
        }
      }

      // ------------------------------------------------------------ agenda
      {
        char today_s[12], day1_s[12], day2_s[12];
        snprintf(today_s, sizeof(today_s), "%04d-%02d-%02d", now.year, now.month, now.day_of_month);
        ESPTime d1 = ESPTime::from_epoch_local(now.timestamp + 86400);
        ESPTime d2 = ESPTime::from_epoch_local(now.timestamp + 2 * 86400);
        snprintf(day1_s, sizeof(day1_s), "%04d-%02d-%02d", d1.year, d1.month, d1.day_of_month);
        snprintf(day2_s, sizeof(day2_s), "%04d-%02d-%02d", d2.year, d2.month, d2.day_of_month);

        // per-day work status + on-call from "YYYY-MM-DD|S|P;..." rows
        std::vector<std::string> ds_date;
        std::vector<char> ds_st, ds_oc;
        if (id(day_status).has_state()) {
          std::string ds = id(day_status).state;
          size_t p = 0;
          while (p < ds.size()) {
            size_t q = ds.find(';', p);
            if (q == std::string::npos) q = ds.size();
            std::string r = ds.substr(p, q - p);
            if (r.size() >= 14 && r[10] == '|' && r[12] == '|') {
              ds_date.push_back(r.substr(0, 10));
              ds_st.push_back(r[11]);
              ds_oc.push_back(r[13]);
            }
            p = q + 1;
          }
        }
        auto day_flags = [&](const std::string &date, char &st, char &oc) {
          st = '-'; oc = '-';
          for (size_t i = 0; i < ds_date.size(); i++)
            if (ds_date[i] == date) { st = ds_st[i]; oc = ds_oc[i]; return; }
        };
        auto status_glyph = [](char st) -> const char * {
          switch (st) {
            case 'O': return "\U000F00D6";  // briefcase
            case 'H': return "\U000F0322";  // laptop
            case 'T': return "\U000F001D";  // airplane
            case 'V': return "\U000F1055";  // palm-tree
            case 'S': return "\U000F06EF";  // medical-bag
            default: return nullptr;
          }
        };

        // parse event rows
        struct Ev { std::string date, label, who, title; };
        std::vector<Ev> evs;
        text_sensor::TextSensor *slots[7] = {id(ev_1), id(ev_2), id(ev_3), id(ev_4), id(ev_5), id(ev_6), id(ev_7)};
        for (auto *slot : slots) {
          if (!slot->has_state()) continue;
          std::string row = slot->state;
          size_t p1 = row.find('|');
          if (p1 == std::string::npos) continue;
          size_t p2 = row.find('|', p1 + 1);
          size_t p3 = row.find('|', p2 + 1);
          if (p2 == std::string::npos || p3 == std::string::npos) continue;
          Ev e;
          e.date = row.substr(0, p1);
          e.label = row.substr(p1 + 1, p2 - p1 - 1);
          e.who = row.substr(p2 + 1, p3 - p2 - 1);
          e.title = row.substr(p3 + 1);
          if (e.date < today_s) e.date = today_s;
          evs.push_back(e);
        }

        // day headers: today..+2 always, later days only when they have events
        std::vector<std::string> days = {today_s, day1_s, day2_s};
        for (auto &e : evs) {
          if (e.date > day2_s && std::find(days.begin(), days.end(), e.date) == days.end())
            days.push_back(e.date);
        }

        int x0 = LEFT_W + 26, x1 = W - MARGIN, y = 16;
        bool first = true;
        for (auto &d : days) {
          if (y > H - STATUS_H - 40) break;
          if (!first) y += 10;
          first = false;

          char hdr[20];
          if (d == today_s) snprintf(hdr, sizeof(hdr), "TODAY");
          else if (d == day1_s) snprintf(hdr, sizeof(hdr), "TOMORROW");
          else {
            int yy = atoi(d.substr(0, 4).c_str());
            int mm = atoi(d.substr(5, 2).c_str());
            int dd = atoi(d.substr(8, 2).c_str());
            int dow = (int)((days_from_civil(yy, mm, dd) + 4) % 7);  // 0 = Sunday
            snprintf(hdr, sizeof(hdr), "%s %s %d", WDAY3[dow], MON3[mm - 1], dd);
          }
          it.print(x0, y, id(font_hdr), hdr);
          int hw = text_w(hdr, id(font_hdr));

          // right-aligned day icons: [on-call chip][status]
          char st, oc;
          day_flags(d, st, oc);
          int icon_x = x1;
          const char *stg = status_glyph(st);
          if (stg != nullptr) {
            icon_x -= 22;
            it.print(icon_x, y - 2, id(mdi_sm), stg);
          }
          if (oc == 'P') {
            icon_x -= 36;
            pill(icon_x, y - 3, icon_x + 28, y + 19);
            it.print(icon_x + 4, y - 2, id(mdi_sm), COLOR_OFF, "\U000F011E");
          } else if (oc == 'S') {
            icon_x -= 30;
            it.print(icon_x + 4, y - 2, id(mdi_sm), "\U000F011E");
          }
          int rule_end = (icon_x < x1) ? icon_x - 10 : x1;
          if (rule_end > x0 + hw + 12)
            hline(x0 + hw + 12, y + 9, rule_end - (x0 + hw + 12), 1);
          y += 30;

          for (auto &e : evs) {
            if (e.date != d) continue;
            if (y > H - STATUS_H - 44) break;
            int cy = y + 15;
            it.filled_circle(x0 + 13, cy, 13);
            it.print(x0 + 13, cy, id(font_badge), COLOR_OFF, TextAlign::CENTER, e.who.c_str());
            int tw2 = text_w(e.label.c_str(), id(font_evtime));
            it.print(x1, cy - 9, id(font_evtime), TextAlign::TOP_RIGHT, e.label.c_str());
            int max_w = (x1 - tw2 - 16) - (x0 + 26 + 12);
            std::string t = e.title;
            if (text_w(t.c_str(), id(font_title)) > max_w) {
              while (t.size() > 1 && text_w((t + "…").c_str(), id(font_title)) > max_w) t.pop_back();
              t += "…";
            }
            it.print(x0 + 26 + 12, cy - 12, id(font_title), t.c_str());
            y += 42;
          }
        }
      }

      // -------------------------------------------------------- status bar
      {
        struct Item { const char *icon; std::string text; bool alert; bool droppable; };
        std::vector<Item> items;
        std::string prio = id(status_priority).has_state() ? id(status_priority).state : "alarm, locks, garage, ev, temp";
        prio += ",";
        size_t pos = 0;
        while (pos < prio.size()) {
          size_t nx = prio.find(',', pos);
          if (nx == std::string::npos) break;
          std::string tok = prio.substr(pos, nx - pos);
          pos = nx + 1;
          size_t a = tok.find_first_not_of(' ');
          if (a == std::string::npos) continue;
          size_t b = tok.find_last_not_of(' ');
          tok = tok.substr(a, b - a + 1);

          if (tok == "alarm" && id(alarm_state).has_state()) {
            std::string st = id(alarm_state).state;
            if (st == "disarmed") items.push_back({"\U000F099E", "Disarmed", false, true});
            else if (st == "triggered") items.push_back({"\U000F0ECC", "ALARM", true, false});
            else if (st == "arming" || st == "pending") items.push_back({"\U000F068A", "Arming", false, true});
            else if (st.rfind("armed", 0) == 0) {
              std::string mode = st.size() > 6 ? st.substr(6) : "";
              if (!mode.empty()) mode[0] = toupper(mode[0]);
              items.push_back({"\U000F0565", "Armed " + mode, false, true});
            }
          } else if (tok == "locks") {
            int unlocked = 0, known = 0;
            text_sensor::TextSensor *locks[4] = {id(lock_front), id(lock_kitchen), id(lock_dining), id(lock_garage)};
            for (auto *l : locks) {
              if (!l->has_state()) continue;
              std::string st = l->state;
              if (st == "unlocked" || st == "unlocking" || st == "open") unlocked++;
              if (st == "locked" || st == "unlocked" || st == "unlocking" || st == "locking" || st == "open") known++;
            }
            if (known > 0) {
              if (unlocked > 0) items.push_back({"\U000F0FC6", std::to_string(unlocked) + " unlocked", true, false});
              else items.push_back({"\U000F033E", "Locked", false, true});
            }
          } else if (tok == "garage") {
            bool open = false, known = false;
            text_sensor::TextSensor *doors[2] = {id(garage_west), id(garage_east)};
            for (auto *d : doors) {
              if (!d->has_state()) continue;
              std::string st = d->state;
              if (st == "open" || st == "opening" || st == "closing") open = true;
              if (st == "open" || st == "closed" || st == "opening" || st == "closing") known = true;
            }
            if (known) {
              if (open) items.push_back({"\U000F06DA", "Garage open", true, false});
              else items.push_back({"\U000F06D9", "Closed", false, true});
            }
          } else if (tok == "ev" && id(ev_batt).has_state()) {
            char b[16];
            snprintf(b, sizeof(b), "EV %.0f%%", id(ev_batt).state);
            float th = id(ev_batt_thresh).has_state() ? id(ev_batt_thresh).state : 20.0f;
            bool low = id(ev_batt).state <= th;
            items.push_back({"\U000F0B6C", b, low, !low});
          } else if (tok == "temp" && id(indoor_temp).has_state()) {
            char b[16];
            snprintf(b, sizeof(b), "%.0f° in", id(indoor_temp).state);
            items.push_back({"\U000F050F", b, false, true});
          }
        }
        // battery alert pill (always shown when present)
        if (id(batt_worst).has_state() && !id(batt_worst).state.empty()) {
          std::string txt = id(batt_worst).state;
          int cnt = id(batt_low_count).has_state() ? (int)id(batt_low_count).state : 1;
          if (cnt > 1) txt += "  +" + std::to_string(cnt - 1);
          items.push_back({"\U000F0083", txt, true, false});
        }

        const int iw = 26, pad = 10, min_gap = 24, avail = W - 2 * MARGIN;
        auto item_w = [&](const Item &i) -> int {
          return iw + 8 + text_w(i.text.c_str(), i.alert ? (esphome::display::BaseFont *) id(font_status_b) : (esphome::display::BaseFont *) id(font_status)) + (i.alert ? 2 * pad : 0);
        };
        auto total_w = [&]() -> int {
          int s = 0;
          for (auto &i : items) s += item_w(i);
          return s + min_gap * ((int)items.size() - 1);
        };
        while (items.size() > 1 && total_w() > avail) {
          bool dropped = false;
          for (int i = (int)items.size() - 1; i >= 0; i--) {
            if (items[i].droppable) { items.erase(items.begin() + i); dropped = true; break; }
          }
          if (!dropped) break;
        }

        int sum = 0;
        for (auto &i : items) sum += item_w(i);
        int gap = items.size() > 1 ? (avail - sum) / ((int)items.size() - 1) : 0;
        int x = MARGIN, y0 = H - STATUS_H, cy = y0 + STATUS_H / 2 + 1;
        for (auto &i : items) {
          int wd2 = item_w(i);
          if (i.alert) {
            pill(x, y0 + 10, x + wd2, H - 10);
            it.print(x + pad, cy - 13, id(mdi_md), COLOR_OFF, i.icon);
            it.print(x + pad + iw + 8, cy, id(font_status_b), COLOR_OFF, TextAlign::CENTER_LEFT, i.text.c_str());
          } else {
            it.print(x, cy - 13, id(mdi_md), i.icon);
            it.print(x + iw + 8, cy, id(font_status), TextAlign::CENTER_LEFT, i.text.c_str());
          }
          x += wd2 + gap;
        }
      }
