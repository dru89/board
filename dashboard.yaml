output:
  - platform: gpio
    pin: GPIO21
    id: display_pwr

esphome:
  name: eink-dashboard
  on_boot:
    priority: 600
    then:
      - output.turn_on: display_pwr
      - delay: 500ms

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_XTAL_FREQ_40: 'y'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    # quick partial render for fast feedback, then a full clean-up refresh
    # once sensor states have settled — clears splash/stale ghosting without
    # ever full-refreshing a half-populated frame
    - delay: 2s
    - component.update: epaper
    - delay: 20s
    - script.execute: full_refresh

script:
  - id: full_refresh
    mode: single
    then:
      - lambda: 'id(epaper).set_full_update_every(1);'
      - component.update: epaper
      - lambda: 'id(epaper).set_full_update_every(30);'

ota:
  - platform: esphome
    password: !secret ota_password

logger:

time:
  - platform: homeassistant
    id: ha_time
    on_time:
      # redraw once a minute, on the minute (partial refresh; full every 30th)
      - seconds: 0
        then:
          - component.update: epaper

interval:
  # fallback refresh while HA time is not yet synced (shows the
  # "Connecting…" splash instead of leaving stale content on screen).
  # Uses a FULL refresh: after a reboot the panel's own RAM may hold a
  # stale frame, and partial updates diff against it — a full refresh
  # resyncs the panel before any partial ever runs.
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return !id(ha_time).now().is_valid();'
          then:
            - script.execute: full_refresh

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

